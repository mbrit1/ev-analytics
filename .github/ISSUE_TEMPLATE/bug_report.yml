name: Bug Report
description: Create a report to help us improve.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Please provide a list of steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sync/Diagnostic Logs
      description: If applicable, add logs from the Diagnostics Panel.
      render: bash
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Version, etc.
      placeholder: Chrome 124, iOS 17.4, PWA Mode...
    validations:
      required: true
